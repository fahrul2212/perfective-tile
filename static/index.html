<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RoomVision AI | Layout Estimation</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f8fafc;
            --text-muted: #94a3b8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Outfit', sans-serif;
        }

        body {
            background-color: var(--bg);
            background-image: 
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(236, 72, 153, 0.1) 0px, transparent 50%);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem;
        }

        .container {
            max-width: 1000px;
            width: 100%;
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 3rem;
            font-weight: 600;
            background: linear-gradient(to right, #818cf8, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        p.subtitle {
            color: var(--text-muted);
            font-size: 1.1rem;
        }

        .upload-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 3rem;
            text-align: center;
            transition: all 0.3s ease;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            margin-bottom: 2rem;
        }

        .upload-card:hover {
            border-color: var(--primary);
            transform: translateY(-4px);
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 16px;
            padding: 3rem;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .drop-zone.dragover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .drop-zone svg {
            width: 48px;
            height: 48px;
            color: var(--primary);
            margin-bottom: 1rem;
        }

        input[type="file"] {
            display: none;
        }

        .btn {
            background: var(--primary);
            color: white;
            padding: 0.8rem 2rem;
            border-radius: 12px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 1.5rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }

        .btn:hover {
            background: var(--primary-hover);
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #results {
            display: none;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        .result-item {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1rem;
            overflow: hidden;
        }

        .result-item h3 {
            margin-bottom: 1rem;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }

        .result-item img {
            width: 100%;
            border-radius: 12px;
            display: block;
        }

        .stats {
            margin-top: 2rem;
            display: flex;
            gap: 2rem;
            justify-content: center;
        }

        .stat-badge {
            background: rgba(255, 255, 255, 0.05);
            padding: 0.5rem 1rem;
            border-radius: 99px;
            font-size: 0.85rem;
            border: 1px solid var(--border);
        }

        .loader {
            display: none;
            width: 24px;
            height: 24px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 768px) {
            #results { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>RoomVision AI</h1>
            <p class="subtitle">Next-generation Perspective & Layout Estimation</p>
        </header>

        <div class="upload-card">
            <div class="drop-zone" id="dropZone">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M7 16a4 4 0 01-.88-7.903A5 5 0 1115.9 6L16 6a5 5 0 011 9.9M15 13l-3-3m0 0l-3 3m3-3v12" />
                </svg>
                <div id="dropText">Drag and drop your room photo here, or click to browse</div>
            </div>
            <input type="file" id="fileInput" accept="image/*">
            
            <button class="btn" id="uploadBtn">
                <div class="loader" id="loader"></div>
                <span id="btnText">Analyze Layout</span>
            </button>

            <div class="stats" id="statsArea" style="display: none;">
                <div class="stat-badge" id="timeBadge">Latency: --</div>
                <div class="stat-badge" id="resBadge">Resolution: --</div>
            </div>
        </div>

        <div id="results">
            <div class="result-item">
                <h3>Layout Mask</h3>
                <img id="maskImg" src="" alt="Mask">
            </div>
            <div class="result-item">
                <h3>Perspective Overlay</h3>
                <img id="overlayImg" src="" alt="Overlay">
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const uploadBtn = document.getElementById('uploadBtn');
        const loader = document.getElementById('loader');
        const btnText = document.getElementById('btnText');
        const results = document.getElementById('results');
        const maskImg = document.getElementById('maskImg');
        const overlayImg = document.getElementById('overlayImg');
        const statsArea = document.getElementById('statsArea');
        const timeBadge = document.getElementById('timeBadge');
        const resBadge = document.getElementById('resBadge');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                handleFileSelect();
            }
        });

        fileInput.addEventListener('change', handleFileSelect);

        function handleFileSelect() {
            if (fileInput.files.length) {
                document.getElementById('dropText').innerText = fileInput.files[0].name;
            }
        }

        uploadBtn.addEventListener('click', async () => {
            if (!fileInput.files.length) return;

            // UI State
            uploadBtn.disabled = true;
            loader.style.display = 'block';
            btnText.innerText = 'Analyzing...';
            results.style.display = 'none';

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);

            try {
                const response = await fetch('/predict', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.status === 'success') {
                    maskImg.src = data.mask_url + '?t=' + Date.now();
                    overlayImg.src = data.overlay_url + '?t=' + Date.now();
                    results.style.display = 'grid';
                    statsArea.style.display = 'flex';
                    timeBadge.innerText = `Latency: ${data.inference_time_ms}ms`;
                    resBadge.innerText = `Resolution: ${data.resolution}`;
                } else {
                    alert('Error: ' + data.detail);
                }
            } catch (err) {
                alert('Connection error: ' + err.message);
            } finally {
                uploadBtn.disabled = false;
                loader.style.display = 'none';
                btnText.innerText = 'Analyze Layout';
            }
        });
    </script>
</body>
</html>
